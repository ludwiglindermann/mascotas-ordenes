version: '3.8'
services:
  mascotasordenes:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@basefullstack_high?TNS_ADMIN=/app/wallet
      - SPRING_DATASOURCE_USERNAME=Admin
      - SPRING_DATASOURCE_PASSWORD=OracleCloud123
